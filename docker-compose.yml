services:
  jobsearch-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jobsearch-mcp
    ports:
      - "8383:8383"
    environment:
      - POSTGRES_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@jobsearch-postgres:5432/jobsearch
      - QDRANT_URL=http://jobsearch-qdrant:6333
      - VALKEY_URL=redis://jobsearch-valkey:6379
      - ADZUNA_APP_ID=${ADZUNA_APP_ID}
      - ADZUNA_APP_KEY=${ADZUNA_APP_KEY}
      - FIRECRAWL_URL=${FIRECRAWL_URL}
      - CRAWL4AI_URL=${CRAWL4AI_URL:-http://host.docker.internal:11235}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OLLAMA_HOST=${OLLAMA_HOST}
      - OLLAMA_EMBED_MODEL=${OLLAMA_EMBED_MODEL:-bge-m3}
      - USAJOBS_API_KEY=${USAJOBS_API_KEY:-}
      - USAJOBS_EMAIL=${USAJOBS_EMAIL:-}
      - FINDWORK_API_KEY=${FINDWORK_API_KEY:-}
      - MCP_PORT=8383
    user: "1000:1000"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      jobsearch-postgres:
        condition: service_healthy
      jobsearch-qdrant:
        condition: service_started
      jobsearch-valkey:
        condition: service_started
    networks:
      - jobsearch-net
      - claudebox-net
    restart: unless-stopped

  job-watcher:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: job-watcher
    command: >
      sh -c "while true; do python -m src.job_watcher; sleep ${JOB_WATCH_INTERVAL_SECONDS:-14400}; done"
    env_file: job-watcher.env
    user: "1000:1000"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      jobsearch-postgres:
        condition: service_healthy
      jobsearch-valkey:
        condition: service_started
    networks:
      - jobsearch-net
    restart: unless-stopped

  jobsearch-postgres:
    image: postgres:16
    container_name: jobsearch-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=jobsearch
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - jobsearch-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d jobsearch"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  jobsearch-qdrant:
    image: qdrant/qdrant
    container_name: jobsearch-qdrant
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - jobsearch-net
    restart: unless-stopped

  jobsearch-valkey:
    image: valkey/valkey:7-alpine
    container_name: jobsearch-valkey
    networks:
      - jobsearch-net
    restart: unless-stopped

networks:
  jobsearch-net:
    name: jobsearch-net
  claudebox-net:
    external: true

volumes:
  postgres-data:
  qdrant-data:
